name: Daily NBA Update

on:
  schedule:
    - cron: '0 13 * * *'  # 10:00 AM Argentina (UTC-3)
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install nba_api requests python-dotenv pandas

      - name: Create directories
        run: mkdir -p db data/raw data/raw/boxscores data/raw/tracking data/raw/potential_ast

      - name: Download current DB from VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 51.210.10.187 >> ~/.ssh/known_hosts 2>/dev/null
          scp ubuntu@51.210.10.187:/home/ubuntu/nba_analytics/db/nba.db db/nba.db
          echo "DB downloaded ($(du -h db/nba.db | cut -f1))"

      - name: Connect to VPN
        env:
          WIREGUARD_CONF: ${{ secrets.WIREGUARD_CONF }}
        run: |
          sudo apt-get install -y wireguard-tools > /dev/null 2>&1
          echo "$WIREGUARD_CONF" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "VPN connected, IP: $(curl -s ifconfig.me)"

      - name: Fetch games
        run: python scripts/fetch/fetch_games.py

      - name: Load games into DB
        run: python scripts/db/load_games.py

      - name: Mark existing boxscores from DB
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('db/nba.db')
          ids = [r[0] for r in conn.execute('SELECT DISTINCT game_id FROM player_stats').fetchall()]
          conn.close()
          for gid in ids:
              open(f'data/raw/boxscores/boxscore_{gid}.json', 'w').write('[]')
          print(f'Marked {len(ids)} existing boxscores')
          "

      - name: Fetch new boxscores only
        run: python scripts/fetch/fetch_boxscore.py
        timeout-minutes: 15

      - name: Load stats into DB
        run: python scripts/db/load_stats.py

      - name: Fetch tracking data (rebound chances, potential assists, usage)
        run: python scripts/fetch/fetch_tracking.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Load tracking into DB
        run: python scripts/db/load_tracking.py
        continue-on-error: true

      - name: Fetch potential assists
        run: python scripts/fetch/fetch_potential_ast.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Load potential assists into DB
        run: python scripts/db/load_potential_ast.py
        continue-on-error: true

      - name: Save today games
        run: |
          python -c "
          import json, sys, os
          sys.path.insert(0, '.')
          from scripts.tools.nba_daily import get_today_games
          from datetime import date
          games = get_today_games()
          os.makedirs('data/raw', exist_ok=True)
          with open('data/raw/today_games.json', 'w') as f:
              json.dump({'date': str(date.today()), 'games': games}, f)
          print(f'{len(games)} games saved')
          "
        continue-on-error: true

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 2>/dev/null || true

      - name: Fetch odds
        run: python scripts/fetch/fetch_odds.py
        continue-on-error: true

      - name: Upload to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          scp db/nba.db ubuntu@51.210.10.187:/home/ubuntu/nba_analytics/db/nba.db
          [ -f data/raw/today_games.json ] && scp data/raw/today_games.json ubuntu@51.210.10.187:/home/ubuntu/nba_analytics/data/raw/today_games.json || true
          [ -f data/raw/odds_cache.json ] && scp data/raw/odds_cache.json ubuntu@51.210.10.187:/home/ubuntu/nba_analytics/data/raw/odds_cache.json || true
          echo "Upload complete"
